<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP RevOps Orbital — Marketeyez</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #1a1a1a; width: 100%; height: 100%; }
    .scene {
      width: 100%;
      aspect-ratio: 17/9;
      max-height: 520px;
      overflow: hidden;
      background: #1a1a1a;
    }
    canvas { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
<div class="scene"><canvas id="c"></canvas></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scene = canvas.parentElement;

let W, H, cx, cy, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = scene.offsetWidth;
  H = scene.offsetHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  cx = W / 2;
  cy = H / 2;
}

const COPPER     = '#b87333';
const COPPER_MID = '#8a5520';
const COPPER_DIM = '#3d2810';
const COAL_MID   = '#242424';
const COAL_LIGHT = '#221c14';
const CREAM      = '#f0ede8';
const GOLD       = '#e8c97a';
const MCP_COLOR  = '#d4915a';

const nodes = [
  { label: 'SalesTech', sub: 'CRM · Engagement · CPQ',       angle: -Math.PI / 2 },
  { label: 'MarTech',   sub: 'Automation · Email · AdTech',  angle: -Math.PI / 2 + (Math.PI * 2 / 5) },
  { label: 'Service',   sub: 'Support · AI Chat · Success',  angle: -Math.PI / 2 + (Math.PI * 4 / 5) },
  { label: 'Data',      sub: 'Warehouse · ETL · CDP',        angle: -Math.PI / 2 + (Math.PI * 6 / 5) },
  { label: 'Analytics', sub: 'BI · Forecasting · Reporting', angle: -Math.PI / 2 + (Math.PI * 8 / 5) },
];

const SPEED = 0.00022;
let offset = 0;
let last = null;
const dotPhases = nodes.map((_, i) => i * (Math.PI * 2 / nodes.length));

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 0.5;
  const step = Math.min(W, H) / 9;
  for (let x = 0; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

function drawCorners() {
  ctx.save();
  ctx.strokeStyle = COPPER; ctx.lineWidth = 1; ctx.globalAlpha = 0.4;
  [[44,44,1,1],[W-44,44,-1,1],[44,H-44,1,-1],[W-44,H-44,-1,-1]].forEach(([px,py,sx,sy]) => {
    ctx.beginPath();
    ctx.moveTo(px,py); ctx.lineTo(px+sx*14,py);
    ctx.moveTo(px,py); ctx.lineTo(px,py+sy*14);
    ctx.stroke();
  });
  ctx.restore();
}

function drawFooter() {
  ctx.save();
  ctx.strokeStyle = COPPER; ctx.lineWidth = 0.5; ctx.globalAlpha = 0.2;
  ctx.beginPath(); ctx.moveTo(44,H-28); ctx.lineTo(W-44,H-28); ctx.stroke();
  ctx.fillStyle = COPPER; ctx.globalAlpha = 0.4;
  ctx.font = '600 8px Barlow, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('MODEL CONTEXT PROTOCOL  ·  REVENUE OPERATIONS  ·  2026', 44, H-14);
  ctx.restore();
}

function drawTag() {
  ctx.save();
  ctx.strokeStyle = COPPER; ctx.lineWidth = 0.75; ctx.globalAlpha = 0.75;
  ctx.strokeRect(44, 34, 98, 18);
  ctx.fillStyle = COPPER; ctx.globalAlpha = 0.85;
  ctx.font = '700 8px Barlow, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('AGENTIC AI', 93, 47);
  ctx.restore();
}

function drawOrbitRing(r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = COPPER_DIM;
  ctx.lineWidth = 0.75; ctx.globalAlpha = 0.55;
  ctx.setLineDash([5,14]); ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();
}

function drawConnector(nx, ny, phase, ts) {
  ctx.save();
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nx,ny);
  ctx.strokeStyle = COPPER; ctx.lineWidth = 3; ctx.globalAlpha = 0.05;
  ctx.stroke();

  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nx,ny);
  ctx.strokeStyle = COPPER_MID; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.75;
  ctx.stroke();

  const t = (Math.sin(ts * 0.0018 + phase) * 0.5 + 0.5);
  const dx = cx + (nx-cx)*t, dy = cy + (ny-cy)*t;
  ctx.beginPath(); ctx.arc(dx,dy,2.5,0,Math.PI*2);
  ctx.fillStyle = GOLD; ctx.globalAlpha = 0.7; ctx.fill();
  ctx.restore();
}

function drawCenterNode(ts) {
  const pulseT = Math.sin(ts * 0.0014) * 0.5 + 0.5;

  [1,2,3].forEach(i => {
    const pr = 66 + i*20 + pulseT*9;
    ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2);
    ctx.strokeStyle = COPPER;
    ctx.globalAlpha = (0.09 - i*0.025) * (1 - pulseT*0.3);
    ctx.lineWidth = 1; ctx.stroke();
  });

  ctx.beginPath(); ctx.arc(cx,cy,56,0,Math.PI*2);
  ctx.fillStyle = COAL_MID; ctx.globalAlpha = 1; ctx.fill();
  ctx.strokeStyle = COPPER; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx,cy,45,0,Math.PI*2);
  ctx.strokeStyle = COPPER_MID; ctx.lineWidth = 0.5; ctx.stroke();

  ctx.save();
  ctx.translate(cx,cy); ctx.rotate(offset*0.5);
  ctx.beginPath(); ctx.arc(0,0,34,0,Math.PI*2);
  ctx.strokeStyle = COPPER_DIM; ctx.lineWidth = 0.5;
  ctx.setLineDash([2,9]); ctx.stroke(); ctx.setLineDash([]);
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = COPPER; ctx.lineWidth = 0.5; ctx.globalAlpha = 0.35;
  ctx.beginPath(); ctx.moveTo(cx-25,cy); ctx.lineTo(cx+25,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-25); ctx.lineTo(cx,cy+25); ctx.stroke();
  ctx.restore();

  [0,Math.PI*.5,Math.PI,Math.PI*1.5].forEach(a => {
    const x1=cx+Math.cos(a)*54, y1=cy+Math.sin(a)*54;
    const x2=cx+Math.cos(a)*61, y2=cy+Math.sin(a)*61;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle=COPPER; ctx.lineWidth=1.5; ctx.globalAlpha=0.8; ctx.stroke();
  });

  ctx.globalAlpha = 1;
  ctx.fillStyle = '#110a04';
  ctx.font = '800 18px Barlow, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('MCP', cx+0.75, cy-11+0.75);
  ctx.fillStyle = MCP_COLOR;
  ctx.font = '800 18px Barlow, sans-serif';
  ctx.fillText('MCP', cx, cy-11);

  ctx.beginPath(); ctx.arc(cx, cy+4, 5, 0, Math.PI*2);
  ctx.fillStyle = COPPER; ctx.globalAlpha = 1; ctx.fill();
  ctx.beginPath(); ctx.arc(cx-1, cy+3, 1.5, 0, Math.PI*2);
  ctx.fillStyle = GOLD; ctx.globalAlpha = 0.6; ctx.fill();

  ctx.globalAlpha = 0.9;
  ctx.fillStyle = COPPER;
  ctx.font = '500 9px Barlow, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Protocol Hub', cx, cy+20);
}

function drawSatelliteNode(x, y, label, sub, scale) {
  const r        = Math.max(34, 38 * scale);
  const fontSize = Math.max(9, 11 * scale);
  const subSize  = Math.max(7,  8 * scale);

  ctx.beginPath(); ctx.arc(x,y,r+12,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a'; ctx.globalAlpha=0.72; ctx.fill();

  ctx.beginPath(); ctx.arc(x,y,r+7,0,Math.PI*2);
  ctx.fillStyle=COPPER; ctx.globalAlpha=0.07; ctx.fill();

  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=COAL_LIGHT; ctx.globalAlpha=1; ctx.fill();
  ctx.strokeStyle=COPPER; ctx.lineWidth=1.25; ctx.stroke();

  ctx.beginPath(); ctx.arc(x,y,r-10,0,Math.PI*2);
  ctx.strokeStyle=COPPER_MID; ctx.lineWidth=0.4;
  ctx.setLineDash([2,5]); ctx.stroke(); ctx.setLineDash([]);

  ctx.globalAlpha=1;
  ctx.fillStyle='#110a04';
  ctx.font=`700 ${fontSize}px Barlow, sans-serif`;
  ctx.textAlign='center';
  ctx.fillText(label, x+0.5, y-8+0.5);
  ctx.fillStyle=CREAM;
  ctx.fillText(label, x, y-8);

  ctx.beginPath(); ctx.arc(x, y+2, 4, 0, Math.PI*2);
  ctx.fillStyle=COPPER; ctx.globalAlpha=1; ctx.fill();
  ctx.beginPath(); ctx.arc(x-0.8, y+1.2, 1.2, 0, Math.PI*2);
  ctx.fillStyle=GOLD; ctx.globalAlpha=0.55; ctx.fill();

  ctx.globalAlpha=0.85;
  ctx.fillStyle=COPPER;
  ctx.font=`500 ${subSize}px Barlow, sans-serif`;
  ctx.textAlign='center';
  ctx.fillText(sub, x, y+16);

  ctx.globalAlpha=1;
}

function frame(ts) {
  if (!last) last = ts;
  const dt = ts - last;
  last = ts;
  offset += SPEED * dt;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,W,H);

  drawGrid();

  const minDim = Math.min(W,H);
  const scale  = minDim / 480;
  const orbitR = minDim * 0.415;

  drawOrbitRing(orbitR);

  const positions = nodes.map((n,i) => ({
    x: cx + Math.cos(n.angle + offset) * orbitR,
    y: cy + Math.sin(n.angle + offset) * orbitR,
    label: n.label, sub: n.sub, phase: dotPhases[i]
  }));

  positions.forEach(n => drawConnector(n.x, n.y, n.phase, ts));
  positions.forEach(n => drawSatelliteNode(n.x, n.y, n.label, n.sub, scale));
  drawCenterNode(ts);
  drawCorners();
  drawTag();
  drawFooter();

  requestAnimationFrame(frame);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(frame);
</script>
</body>
</html>
